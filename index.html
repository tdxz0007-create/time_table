<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Year Finance & Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --success: #2ecc71;
            --danger: #eb4d4b;
            --bg: #f1f2f6;
        }

        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* Navigation */
        nav { display: flex; background: white; sticky; top: 0; z-index: 10; border-bottom: 2px solid #eee; }
        nav button { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-family: 'Kanit'; font-weight: 600; color: #999; transition: 0.3s; }
        nav button.active { color: var(--primary); border-bottom: 4px solid var(--primary); }

        /* Content */
        .content { padding: 20px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* Dashboard Card */
        .card { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .filter-section { display: flex; gap: 10px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; }
        .filter-section select { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }

        /* Form & Inputs */
        .form-group { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        input, select, button.btn-add { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Kanit'; }
        button.btn-add { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .amt-plus { color: var(--success); font-weight: bold; }
        .amt-minus { color: var(--danger); font-weight: bold; }

        /* Auth */
        .auth-screen { padding: 50px 20px; text-align: center; }
        .hidden { display: none; }
        .btn-logout { background: #95a5a6; color: white; margin-top: 20px; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-family: 'Kanit'; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="auth-section" class="auth-screen">
        <h2 id="auth-title">เข้าสู่ระบบ</h2>
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-add" onclick="handleAuth()">เริ่มใช้งาน</button>
        <p onclick="toggleAuth()" id="toggle-text" style="color: var(--primary); cursor: pointer; margin-top: 15px;">ยังไม่มีบัญชี? สมัครสมาชิก</p>
    </div>

    <!-- Main Application Section -->
    <div id="app-section" class="hidden">
        <nav>
            <button id="nav-fin" class="active" onclick="showPage('fin')">💰 รายรับ-รายจ่าย</button>
            <button id="nav-plan" onclick="showPage('plan')">📅 ตารางแผนงาน</button>
        </nav>

        <div class="content">
            <!-- หน้า: รายรับ-รายจ่าย -->
            <div id="page-fin" class="page active">
                <div class="card">
                    <small>ยอดคงเหลือตามตัวกรอง</small>
                    <h2 id="summary-total">฿0.00</h2>
                </div>

                <div class="filter-section">
                    <select id="filter-year" onchange="updateFinanceUI()"></select>
                    <select id="filter-month" onchange="updateFinanceUI()">
                        <option value="all">ทุกเดือน</option>
                        <option value="01">มกราคม</option><option value="02">กุมภาพันธ์</option>
                        <option value="03">มีนาคม</option><option value="04">เมษายน</option>
                        <option value="05">พฤษภาคม</option><option value="06">มิถุนายน</option>
                        <option value="07">กรกฎาคม</option><option value="08">สิงหาคม</option>
                        <option value="09">กันยายน</option><option value="10">ตุลาคม</option>
                        <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="date" id="fin-date">
                    <input type="text" id="fin-note" placeholder="รายการ เช่น เงินเดือน, ซื้อของ">
                    <input type="number" id="fin-amount" placeholder="จำนวนเงิน (รายจ่ายใส่ติดลบ -)">
                    <button class="btn-add" onclick="addFinance()">บันทึกข้อมูล</button>
                </div>

                <table>
                    <thead><tr><th>ว/ด/ป</th><th>รายการ</th><th>จำนวน</th></tr></thead>
                    <tbody id="fin-table-body"></tbody>
                </table>
            </div>

            <!-- หน้า: ตารางแผนงาน -->
            <div id="page-plan" class="page">
                <h3>📅 แผนงานระยะยาว</h3>
                <div class="form-group">
                    <input type="date" id="plan-date">
                    <input type="text" id="plan-task" placeholder="กิจกรรม/สิ่งที่ต้องทำ">
                    <button class="btn-add" style="background: var(--secondary);" onclick="addPlan()">เพิ่มแผนงาน</button>
                </div>

                <div id="plan-list"></div>
            </div>

            <button class="btn-logout" onclick="location.reload()">ออกจากระบบ</button>
        </div>
    </div>
</div>

<script>
    let isLogin = true;
    let currentUser = null;

    // --- ระบบสมาชิก ---
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
        document.getElementById('toggle-text').innerText = isLogin ? 'ยังไม่มีบัญชี? สมัครสมาชิก' : 'มีบัญชีแล้ว? เข้าสู่ระบบ';
    }

    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert('กรุณากรอกข้อมูล');

        let users = JSON.parse(localStorage.getItem('multiYearApp')) || {};
        if(isLogin) {
            if(users[u] && users[u].password === p) login(u);
            else alert('ข้อมูลไม่ถูกต้อง');
        } else {
            if(users[u]) return alert('ชื่อนี้ถูกใช้แล้ว');
            users[u] = { password: p, finance: [], plans: [] };
            localStorage.setItem('multiYearApp', JSON.stringify(users));
            alert('สมัครสมาชิกสำเร็จ!'); toggleAuth();
        }
    }

    function login(u) {
        currentUser = u;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        initYearFilter();
        updateFinanceUI();
        updatePlanUI();
    }

    // --- ระบบจัดการหน้าจอ ---
    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('nav-'+p).classList.add('active');
    }

    function initYearFilter() {
        const yearSelect = document.getElementById('filter-year');
        const currentYear = new Date().getFullYear();
        for(let i = currentYear; i >= currentYear - 5; i--) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = "ปี " + (i + 543);
            yearSelect.appendChild(opt);
        }
        document.getElementById('fin-date').valueAsDate = new Date();
        document.getElementById('plan-date').valueAsDate = new Date();
    }

    // --- รายรับรายจ่าย ---
    function addFinance() {
        const date = document.getElementById('fin-date').value;
        const note = document.getElementById('fin-note').value;
        const amount = document.getElementById('fin-amount').value;
        if(!date || !note || !amount) return;

        let users = JSON.parse(localStorage.getItem('multiYearApp'));
        users[currentUser].finance.push({ date, note, amount: parseFloat(amount) });
        localStorage.setItem('multiYearApp', JSON.stringify(users));
        
        document.getElementById('fin-note').value = '';
        document.getElementById('fin-amount').value = '';
        updateFinanceUI();
    }

    function updateFinanceUI() {
        const users = JSON.parse(localStorage.getItem('multiYearApp'));
        const fYear = document.getElementById('filter-year').value;
        const fMonth = document.getElementById('filter-month').value;
        
        let filtered = users[currentUser].finance.filter(item => {
            const d = new Date(item.date);
            const yMatch = d.getFullYear().toString() === fYear;
            const mMatch = fMonth === 'all' || (d.getMonth() + 1).toString().padStart(2, '0') === fMonth;
            return yMatch && mMatch;
        });

        // เรียงวันที่
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

        const tbody = document.getElementById('fin-table-body');
        tbody.innerHTML = '';
        let total = 0;

        filtered.forEach(item => {
            total += item.amount;
            const row = `<tr>
                <td>${new Date(item.date).toLocaleDateString('th-TH')}</td>
                <td>${item.note}</td>
                <td class="${item.amount >= 0 ? 'amt-plus' : 'amt-minus'}">${item.amount.toLocaleString()}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
        document.getElementById('summary-total').innerText = `฿${total.toLocaleString()}`;
    }

    // --- ตารางแผนงาน ---
    function addPlan() {
        const date = document.getElementById('plan-date').value;
        const task = document.getElementById('plan-task').value;
        if(!date || !task) return;

        let users = JSON.parse(localStorage.getItem('multiYearApp'));
        users[currentUser].plans.push({ date, task });
        localStorage.setItem('multiYearApp', JSON.stringify(users));
        
        document.getElementById('plan-task').value = '';
        updatePlanUI();
    }

    function updatePlanUI() {
        const users = JSON.parse(localStorage.getItem('multiYearApp'));
        let plans = users[currentUser].plans;
        plans.sort((a, b) => new Date(a.date) - new Date(b.date));

        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        plans.forEach(p => {
            const dateStr = new Date(p.date).toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            list.innerHTML += `
                <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--secondary);">
                    <small style="color: #666;">${dateStr}</small>
                    <div style="font-weight: 600;">${p.task}</div>
                </div>`;
        });
    }
</script>
</body>
</html>
