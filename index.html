<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับรายจ่าย</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
        .box { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-top: 5px solid #1a3c6d; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-inc { background: #28a745; }
        .btn-exp { background: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .total-bar { background: #1a3c6d; color: white; padding: 10px; border-radius: 5px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <h3>💰 รายรับ-รายจ่าย</h3>

    <div class="box">
        <strong>1. รายรับ</strong>
        <input type="text" id="incName" placeholder="ชื่อรายการ">
        <input type="number" id="incAmt" placeholder="จำนวนเงิน">
        <button class="btn-inc" onclick="addData('inc')">เพิ่มรายรับ</button>
        <table id="incTable">
            <thead><tr><th>รายการ</th><th>เงิน</th></tr></thead>
            <tbody id="incBody"></tbody>
        </table>
    </div>

    <div class="box">
        <strong>2. รายจ่าย</strong>
        <input type="text" id="expName" placeholder="ชื่อรายการ">
        <input type="number" id="expAmt" placeholder="จำนวนเงิน">
        <button class="btn-exp" onclick="addData('exp')">เพิ่มรายจ่าย</button>
        <table id="expTable">
            <thead><tr><th>รายการ</th><th>เงิน</th></tr></thead>
            <tbody id="expBody"></tbody>
        </table>
    </div>

    <div class="total-bar" id="summary">
        รอรับข้อมูล...
    </div>

    <button onclick="localStorage.clear(); location.reload();" style="background:#666; margin-top:20px;">ล้างข้อมูลทั้งหมด</button>

<script>
    // ดึงข้อมูล
    let data = JSON.parse(localStorage.getItem('money_v2')) || { inc: [], exp: [] };

    // แสดงผลทันทีที่เปิดหน้า
    render();

    function addData(type) {
        const nameInput = document.getElementById(type + 'Name');
        const amtInput = document.getElementById(type + 'Amt');
        
        const name = nameInput.value;
        const amt = parseFloat(amtInput.value);

        if (!name || isNaN(amt)) {
            alert("กรุณากรอกชื่อและตัวเลขจำนวนเงินให้ถูกต้องครับ");
            return;
        }

        // เพิ่มข้อมูลลงตัวแปร
        data[type].push({ n: name, a: amt });

        // บันทึกลงเครื่อง
        localStorage.setItem('money_v2', JSON.stringify(data));

        // ล้างช่องพิมพ์
        nameInput.value = '';
        amtInput.value = '';

        // อัปเดตหน้าจอ
        render();
    }

    function render() {
        const incBody = document.getElementById('incBody');
        const expBody = document.getElementById('expBody');
        
        incBody.innerHTML = '';
        expBody.innerHTML = '';

        let tInc = 0;
        let tExp = 0;

        data.inc.forEach(item => {
            tInc += item.a;
            incBody.innerHTML += `<tr><td>${item.n}</td><td>${item.a}</td></tr>`;
        });

        data.exp.forEach(item => {
            tExp += item.a;
            expBody.innerHTML += `<tr><td>${item.n}</td><td>${item.a}</td></tr>`;
        });

        const diff = tInc - tExp;
        document.getElementById('summary').innerHTML = `
            รายรับ: ${tInc} | รายจ่าย: ${tExp} <br>
            <b>คงเหลือ: ${diff} บาท</b>
        `;
    }
</script>

</body>
</html>
