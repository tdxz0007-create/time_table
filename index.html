<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับรายจ่ายสุดมินิมอล</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: #2d3436; }

        /* Auth Styles */
        .auth-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Tracker Styles */
        .balance-card {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .income-box { background: var(--success); }
        .expense-box { background: var(--danger); }

        .form-group { margin-bottom: 15px; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Kanit';
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        .history {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            background: #fff;
            padding: 10px;
            border-bottom: 1px solid #eee;
            border-left: 5px solid #ccc;
        }

        .item.plus { border-left-color: var(--success); }
        .item.minus { border-left-color: var(--danger); }

        .hidden { display: none; }
        .logout-btn { background: #636e72; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- Section: Login/Register -->
    <div id="auth-section" class="auth-box">
        <h2 id="auth-title">เข้าสู่ระบบ</h2>
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button onclick="handleAuth()" id="main-auth-btn">ตกลง</button>
        <p style="text-align:center; font-size: 0.9rem;">
            <a href="#" onclick="toggleAuthMode()" id="toggle-link">ยังไม่มีบัญชี? สมัครสมาชิก</a>
        </p>
    </div>

    <!-- Section: Main App -->
    <div id="app-section" class="hidden">
        <h2>สวัสดี, <span id="user-display"></span></h2>
        
        <div class="balance-card">
            <small>ยอดคงเหลือสุทธิ</small>
            <h1 id="balance">฿0.00</h1>
        </div>

        <div class="stats">
            <div class="stat-box income-box">
                <small>รายรับ</small>
                <div id="money-plus">฿0.00</div>
            </div>
            <div class="stat-box expense-box">
                <small>รายจ่าย</small>
                <div id="money-minus">฿0.00</div>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="text" placeholder="ชื่อรายการ (เช่น เงินเดือน, ค่าข้าว)">
            <input type="number" id="amount" placeholder="จำนวนเงิน (ใส่ - หน้าตัวเลขเพื่อเป็นรายจ่าย)">
            <button onclick="addTransaction()">เพิ่มรายการ</button>
        </div>

        <h3>ประวัติรายการ</h3>
        <div id="list" class="history"></div>

        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </div>
</div>

<script>
    let isLoginMode = true;
    let currentUser = null;

    // --- ระบบสมาชิก ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
        document.getElementById('toggle-link').innerText = isLoginMode ? 'ยังไม่มีบัญชี? สมัครสมาชิก' : 'มีบัญชีแล้ว? เข้าสู่ระบบ';
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('users')) || {};

        if (!user || !pass) return alert('กรุณากรอกข้อมูลให้ครบ');

        if (isLoginMode) {
            if (users[user] && users[user].password === pass) {
                login(user);
            } else {
                alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        } else {
            if (users[user]) return alert('ชื่อนี้มีผู้ใช้แล้ว');
            users[user] = { password: pass, transactions: [] };
            localStorage.setItem('users', JSON.stringify(users));
            alert('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');
            toggleAuthMode();
        }
    }

    function login(username) {
        currentUser = username;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('user-display').innerText = username;
        updateUI();
    }

    function logout() {
        currentUser = null;
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('app-section').classList.add('hidden');
    }

    // --- ระบบรายรับรายจ่าย ---
    function addTransaction() {
        const text = document.getElementById('text').value;
        const amount = document.getElementById('amount').value;

        if (text.trim() === '' || amount.trim() === '') return alert('กรุณากรอกข้อมูล');

        const transaction = {
            id: Date.now(),
            text: text,
            amount: +amount
        };

        const users = JSON.parse(localStorage.getItem('users'));
        users[currentUser].transactions.push(transaction);
        localStorage.setItem('users', JSON.stringify(users));

        document.getElementById('text').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    function updateUI() {
        const users = JSON.parse(localStorage.getItem('users'));
        const transactions = users[currentUser].transactions;

        const list = document.getElementById('list');
        list.innerHTML = '';

        const amounts = transactions.map(t => t.amount);
        const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
        const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
        const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

        document.getElementById('balance').innerText = `฿${total}`;
        document.getElementById('money-plus').innerText = `฿${income}`;
        document.getElementById('money-minus').innerText = `฿${expense}`;

        transactions.forEach(t => {
            const sign = t.amount < 0 ? '-' : '+';
            const item = document.createElement('div');
            item.classList.add('item', t.amount < 0 ? 'minus' : 'plus');
            item.innerHTML = `
                ${t.text} <span>${sign}${Math.abs(t.amount)}</span>
            `;
            list.appendChild(item);
        });
    }
</script>

</body>
</html>
