<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับรายจ่ายสุดมินิมอล</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: var(--primary); }

        /* Login Form */
        #login-section { display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login { background: var(--primary); color: white; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }

        /* App Section */
        #app-section { display: none; }
        
        .balance-card {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .income-box { background: var(--success); }
        .expense-box { background: var(--danger); }

        .history-list {
            list-style: none;
            padding: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            border-left: 5px solid #ddd;
        }

        .item-plus { border-left-color: var(--success); }
        .item-minus { border-left-color: var(--danger); }

        .logout-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- ส่วน Login -->
    <div id="login-section" class="container">
        <h2>ยินดีต้อนรับ</h2>
        <p style="text-align:center; color:#666;">กรุณาเข้าสู่ระบบเพื่อจัดการเงินของคุณ</p>
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <!-- ส่วนแอปหลัก -->
    <div id="app-section" class="container">
        <h2 id="welcome-msg">สวัสดี</h2>
        
        <div class="balance-card">
            <small>ยอดเงินคงเหลือ</small>
            <h1 id="balance">฿0.00</h1>
        </div>

        <div class="stats">
            <div class="stat-box income-box">
                <small>รายรับ</small>
                <div id="money-plus">฿0</div>
            </div>
            <div class="stat-box expense-box">
                <small>รายจ่าย</small>
                <div id="money-minus">฿0</div>
            </div>
        </div>

        <h3>เพิ่มรายการ</h3>
        <input type="text" id="text" placeholder="ชื่อรายการ (เช่น เงินเดือน, ข้าวกลางวัน)">
        <input type="number" id="amount" placeholder="จำนวนเงิน (บวก=รายรับ, ลบ=รายจ่าย)">
        <button class="btn-add" onclick="addTransaction()">บันทึกรายการ</button>

        <h3>ประวัติ</h3>
        <ul id="list" class="history-list"></ul>

        <a href="#" class="logout-link" onclick="logout()">ออกจากระบบ</a>
    </div>

    <script>
        const loginSection = document.getElementById('login-section');
        const appSection = document.getElementById('app-section');
        const list = document.getElementById('list');
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');

        let transactions = [];

        // เช็คสถานะ Login เมื่อโหลดหน้า
        window.onload = () => {
            const user = localStorage.getItem('currentUser');
            if (user) {
                showApp(user);
            }
        };

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === '1234') { // กำหนด User/Pass ง่ายๆ
                localStorage.setItem('currentUser', user);
                showApp(user);
            } else {
                alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง! (ลอง admin/1234)');
            }
        }

        function showApp(user) {
            loginSection.style.display = 'none';
            appSection.style.display = 'block';
            document.getElementById('welcome-msg').innerText = `สวัสดีคุณ ${user}`;
            
            // โหลดข้อมูลจาก LocalStorage
            const savedData = localStorage.getItem(`data_${user}`);
            transactions = savedData ? JSON.parse(savedData) : [];
            updateUI();
        }

        function addTransaction() {
            const text = document.getElementById('text').value;
            const amount = document.getElementById('amount').value;

            if (text.trim() === '' || amount.trim() === '') {
                alert('กรุณากรอกข้อมูลให้ครบ');
                return;
            }

            const transaction = {
                id: Math.floor(Math.random() * 1000000),
                text: text,
                amount: +amount
            };

            transactions.push(transaction);
            saveData();
            updateUI();

            document.getElementById('text').value = '';
            document.getElementById('amount').value = '';
        }

        function updateUI() {
            list.innerHTML = '';
            
            const amounts = transactions.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            balance.innerText = `฿${total}`;
            money_plus.innerText = `+฿${income}`;
            money_minus.innerText = `-฿${expense}`;

            transactions.forEach(t => {
                const item = document.createElement('li');
                const sign = t.amount < 0 ? '-' : '+';
                item.classList.add('history-item');
                item.classList.add(t.amount < 0 ? 'item-minus' : 'item-plus');
                
                item.innerHTML = `
                    ${t.text} <span>${sign}${Math.abs(t.amount)}</span>
                `;
                list.appendChild(item);
            });
        }

        function saveData() {
            const user = localStorage.getItem('currentUser');
            localStorage.setItem(`data_${user}`, JSON.stringify(transactions));
        }

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
</html>
