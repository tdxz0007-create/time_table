<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรายรับรายจ่าย</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

/* container */
.container {
  max-width: 480px;
  margin: auto;
  padding: 15px;
}

/* card */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* input */
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  background: #007bff;
  color: white;
  border: none;
}

button:hover {
  background: #0056b3;
}

/* menu */
.menu {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
}

.menu button {
  flex: 1;
  margin: 3px;
}

/* hidden */
.hidden {
  display: none;
}

/* header */
h2 {
  text-align: center;
}

/* checkbox */
.goal-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.goal-item input {
  width: auto;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h2>เข้าสู่ระบบ</h2>
  <input type="text" id="loginUser" placeholder="ชื่อผู้ใช้">
  <input type="password" id="loginPass" placeholder="รหัสผ่าน">
  <button onclick="login()">เข้าสู่ระบบ</button>
  <p style="text-align:center;">ยังไม่มีบัญชี?</p>
  <button onclick="showRegister()">สมัครสมาชิก</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="card hidden">
  <h2>สมัครสมาชิก</h2>
  <input type="text" id="regUser" placeholder="ชื่อผู้ใช้">
  <input type="password" id="regPass" placeholder="รหัสผ่าน">
  <button onclick="register()">สมัคร</button>
  <button onclick="showLogin()">กลับ</button>
</div>

<!-- MAIN APP -->
<div id="appPage" class="hidden">

  <!-- MENU -->
  <div class="menu">
    <button onclick="showPage('incomePage')">รายรับ/รายจ่าย</button>
    <button onclick="showPage('summaryPage')">สรุป</button>
    <button onclick="showPage('goalPage')">เป้าหมาย</button>
    <button onclick="logout()">ออก</button>
  </div>

  <!-- INCOME EXPENSE PAGE -->
  <div id="incomePage" class="card">
    <h2>เพิ่มรายการ</h2>
    <input type="date" id="date">
    <input type="number" id="amount" placeholder="จำนวนเงิน">
    <select id="type">
      <option value="income">รายรับ</option>
      <option value="expense">รายจ่าย</option>
    </select>
    <input type="text" id="note" placeholder="หมายเหตุ">
    <button onclick="addRecord()">เพิ่ม</button>

    <div id="recordList"></div>
  </div>

  <!-- SUMMARY PAGE -->
  <div id="summaryPage" class="card hidden">
    <h2>สรุป</h2>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="calculateSummary()">คำนวณ</button>

    <p id="summaryResult"></p>
  </div>

  <!-- GOAL PAGE -->
  <div id="goalPage" class="card hidden">
    <h2>เป้าหมาย</h2>
    <input type="text" id="goalText" placeholder="เป้าหมาย">
    <input type="date" id="goalDate">
    <button onclick="addGoal()">เพิ่ม</button>

    <div id="goalList"></div>
  </div>

</div>

</div>

<script>

// หน้า
function showRegister(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin(){
  document.getElementById("registerPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function showPage(pageId){
  document.getElementById("incomePage").classList.add("hidden");
  document.getElementById("summaryPage").classList.add("hidden");
  document.getElementById("goalPage").classList.add("hidden");

  document.getElementById(pageId).classList.remove("hidden");
}

// LOGIN SYSTEM (LocalStorage)
function register(){
  let user = document.getElementById("regUser").value;
  let pass = document.getElementById("regPass").value;

  if(user && pass){
    localStorage.setItem("user_"+user, pass);
    alert("สมัครสำเร็จ");
    showLogin();
  }
}

function login(){
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let saved = localStorage.getItem("user_"+user);

  if(saved === pass){
    localStorage.setItem("currentUser", user);
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
    loadData();
  } else {
    alert("ข้อมูลไม่ถูกต้อง");
  }
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}
/////////////////////////////
// STORAGE
/////////////////////////////

function getUserKey(){
  return "data_" + localStorage.getItem("currentUser");
}

function getRecords(){
  return JSON.parse(localStorage.getItem(getUserKey()) || "[]");
}

function saveRecords(data){
  localStorage.setItem(getUserKey(), JSON.stringify(data));
}

/////////////////////////////
// LOAD DATA
/////////////////////////////

function loadData(){
  renderRecords();
  renderGoals();
}

/////////////////////////////
// ADD RECORD
/////////////////////////////

function addRecord(){
  let date = document.getElementById("date").value;
  let amount = document.getElementById("amount").value;
  let type = document.getElementById("type").value;
  let note = document.getElementById("note").value;

  if(!date || !amount){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  let records = getRecords();

  records.push({
    id: Date.now(),
    date,
    amount: Number(amount),
    type,
    note
  });

  saveRecords(records);
  renderRecords();

  document.getElementById("amount").value = "";
  document.getElementById("note").value = "";
}

/////////////////////////////
// RENDER RECORDS
/////////////////////////////

function renderRecords(){
  let list = document.getElementById("recordList");
  let records = getRecords();

  list.innerHTML = "";

  if(records.length === 0){
    list.innerHTML = "<p>ยังไม่มีข้อมูล</p>";
    return;
  }

  records.reverse().forEach(r => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${r.date}</b><br>
      ${r.type === "income" ? "💰 รายรับ" : "💸 รายจ่าย"}<br>
      จำนวน: ${r.amount} บาท<br>
      ${r.note || ""}<br>
      <button onclick="deleteRecord(${r.id})">ลบ</button>
    `;

    list.appendChild(div);
  });

  records.reverse(); // คืนค่า
}

/////////////////////////////
// DELETE
/////////////////////////////

function deleteRecord(id){
  let records = getRecords();
  records = records.filter(r => r.id !== id);
  saveRecords(records);
  renderRecords();
}

function deleteAllRecords(){
  if(confirm("ลบทั้งหมด?")){
    saveRecords([]);
    renderRecords();
  }
}

/////////////////////////////
// SUMMARY
/////////////////////////////

function calculateSummary(){
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  let records = getRecords();

  let income = 0;
  let expense = 0;

  records.forEach(r => {
    if((!start || r.date >= start) && (!end || r.date <= end)){
      if(r.type === "income") income += r.amount;
      else expense += r.amount;
    }
  });

  let result = `
    รายรับ: ${income} บาท <br>
    รายจ่าย: ${expense} บาท <br>
    คงเหลือ: ${income - expense} บาท
  `;

  document.getElementById("summaryResult").innerHTML = result;
}/////////////////////////////
// GOAL STORAGE
/////////////////////////////

function getGoalKey(){
  return "goals_" + localStorage.getItem("currentUser");
}

function getGoals(){
  return JSON.parse(localStorage.getItem(getGoalKey()) || "[]");
}

function saveGoals(data){
  localStorage.setItem(getGoalKey(), JSON.stringify(data));
}

/////////////////////////////
// ADD GOAL
/////////////////////////////

function addGoal(){
  let text = document.getElementById("goalText").value;
  let date = document.getElementById("goalDate").value;

  if(!text || !date){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  let goals = getGoals();

  goals.push({
    id: Date.now(),
    text,
    date,
    done: false
  });

  saveGoals(goals);
  renderGoals();

  document.getElementById("goalText").value = "";
}

/////////////////////////////
// RENDER GOALS
/////////////////////////////

function renderGoals(){
  let list = document.getElementById("goalList");
  let goals = getGoals();

  list.innerHTML = "";

  if(goals.length === 0){
    list.innerHTML = "<p>ยังไม่มีเป้าหมาย</p>";
    return;
  }

  goals.reverse().forEach(g => {
    let div = document.createElement("div");
    div.className = "card goal-item";

    div.innerHTML = `
      <div>
        <b>${g.text}</b><br>
        <small>${g.date}</small>
      </div>
      <div>
        <input type="checkbox" ${g.done ? "checked" : ""}
          onchange="toggleGoal(${g.id})">
        <button onclick="deleteGoal(${g.id})">ลบ</button>
      </div>
    `;

    list.appendChild(div);
  });

  goals.reverse();
}

/////////////////////////////
// TOGGLE GOAL
/////////////////////////////

function toggleGoal(id){
  let goals = getGoals();

  goals = goals.map(g => {
    if(g.id === id){
      g.done = !g.done;
    }
    return g;
  });

  saveGoals(goals);
  renderGoals();
}

/////////////////////////////
// DELETE GOAL
/////////////////////////////

function deleteGoal(id){
  let goals = getGoals();
  goals = goals.filter(g => g.id !== id);
  saveGoals(goals);
  renderGoals();
}

/////////////////////////////
// AUTO LOGIN CHECK
/////////////////////////////

window.onload = function(){
  let user = localStorage.getItem("currentUser");

  if(user){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
    loadData();
  }
}

/////////////////////////////
// EXTRA UI IMPROVEMENTS
/////////////////////////////

// เพิ่มปุ่มลบทั้งหมดในหน้า record
const incomePage = document.getElementById("incomePage");
if(incomePage){
  let btn = document.createElement("button");
  btn.innerText = "ลบทั้งหมด";
  btn.style.background = "red";
  btn.onclick = deleteAllRecords;
  incomePage.appendChild(btn);
}

/////////////////////////////

</script>
</body>
</html>
