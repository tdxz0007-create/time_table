<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางเวลา (Mobile Friendly)</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Tahoma', sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 850px; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; font-size: 1.5rem; }
        
        /* ส่วนกรอกข้อมูล ปรับให้ยืดหยุ่นตามหน้าจอ */
        .input-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        @media (min-width: 600px) {
            .input-section { display: grid; grid-template-columns: 1fr 1fr 2fr 1fr; }
        }
        
        input, button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; /* 16px ช่วยไม่ให้ iPhone Zoom เวลาพิมพ์ */ }
        .add-btn { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* สไตล์ตารางหลัก */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f4f4f4; }
        
        .done { text-decoration: line-through; color: #888; opacity: 0.6; }
        .delete-btn { color: var(--danger); cursor: pointer; border: none; background: none; font-size: 20px; }

        /* --- จุดสำคัญ: ปรับแต่งสำหรับมือถือ --- */
        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; } /* ซ่อนหัวตาราง */
            tr { border: 1px solid #ccc; margin-bottom: 10px; border-radius: 10px; padding: 10px; background: #fff; }
            td { border: none; position: relative; padding-left: 50%; }
            td:before { position: absolute; left: 10px; width: 45%; font-weight: bold; color: var(--primary); content: attr(data-label); }
            .checkbox-cell { text-align: left; padding-left: 0; border-bottom: 1px solid #eee; margin-bottom: 5px; }
            .checkbox-cell:before { content: "สถานะ: "; position: relative; left: 0; margin-right: 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>📝 ตารางเวลาของฉัน</h2>

    <div class="input-section">
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <input type="text" id="noteInput" placeholder="ต้องทำอะไร...">
        <button class="add-btn" onclick="addSchedule()">เพิ่ม</button>
    </div>

    <table id="scheduleTable">
        <thead>
            <tr>
                <th>เสร็จ</th>
                <th>วันที่</th>
                <th>เวลา</th>
                <th>หมายเหตุ</th>
                <th>ลบ</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', loadData);

    function addSchedule() {
        const date = document.getElementById('dateInput').value;
        const time = document.getElementById('timeInput').value;
        const note = document.getElementById('noteInput').value;

        if (!date || !time || !note) {
            alert("กรอกข้อมูลให้ครบก่อนนะครับ");
            return;
        }

        const item = {
            id: Date.now(),
            date: new Date(date).toLocaleDateString('th-TH'),
            time: time,
            note: note,
            completed: false
        };

        saveToLocal(item);
        renderRow(item);
        document.getElementById('dateInput').value = '';
        document.getElementById('timeInput').value = '';
        document.getElementById('noteInput').value = '';
    }

    function renderRow(item) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.setAttribute('data-id', item.id);
        if (item.completed) row.classList.add('done');

        row.innerHTML = `
            <td class="checkbox-cell"><input type="checkbox" ${item.completed ? 'checked' : ''} onclick="toggleStatus(${item.id})"></td>
            <td data-label="วันที่">${item.date}</td>
            <td data-label="เวลา">${item.time} น.</td>
            <td data-label="หมายเหตุ">${item.note}</td>
            <td data-label="ลบ"><button class="delete-btn" onclick="deleteItem(${item.id})">🗑️</button></td>
        `;
        tbody.appendChild(row);
    }

    function saveToLocal(item) {
        let history = JSON.parse(localStorage.getItem('mySchedule')) || [];
        history.push(item);
        localStorage.setItem('mySchedule', JSON.stringify(history));
    }

    function loadData() {
        let
