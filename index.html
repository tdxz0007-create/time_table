<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บัญชีรายรับ-รายจ่าย</title>
    <style>
        :root { --blue: #1a3c6d; --green: #28a745; --red: #dc3545; --grey: #6c757d; }
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* สรุปด้านบน */
        .summary-dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 8px; text-align: center; color: white; }
        .bg-green { background: var(--green); }
        .bg-red { background: var(--red); }
        .bg-blue { background: var(--blue); }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .stat-value { font-size: 18px; font-weight: bold; }

        /* แถบเปรียบเทียบ */
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; display: flex; }
        #prog-inc { background: var(--green); height: 100%; transition: 0.5s; }
        #prog-exp { background: var(--red); height: 100%; transition: 0.5s; }

        /* ฟอร์มกรอก */
        .input-group { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* รายการ */
        .list-section { margin-top: 20px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fff; }
        .item-date { font-size: 11px; color: #888; }
        .item-name { font-weight: bold; }
        .txt-green { color: var(--green); }
        .txt-red { color: var(--red); }
        .del-btn { color: #ccc; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align:center; color:var(--blue);">📊 สรุปแผนการเงิน</h3>

    <div class="summary-dashboard">
        <div class="stat-box bg-green">
            <div class="stat-label">รายรับ</div>
            <div id="top-inc" class="stat-value">0</div>
        </div>
        <div class="stat-box bg-red">
            <div class="stat-label">รายจ่าย</div>
            <div id="top-exp" class="stat-value">0</div>
        </div>
        <div class="stat-box bg-blue">
            <div class="stat-label">คงเหลือ</div>
            <div id="top-bal" class="stat-value">0</div>
        </div>
    </div>

    <div style="font-size:12px; text-align:center; color:#555;">สัดส่วน รายรับ (เขียว) : รายจ่าย (แดง)</div>
    <div class="progress-container">
        <div id="prog-inc" style="width: 50%;"></div>
        <div id="prog-exp" style="width: 50%;"></div>
    </div>

    <div class="input-group">
        <input type="date" id="ipt-date">
        <input type="text" id="ipt-name" placeholder="ชื่อรายการ (เช่น ขายของ, ค่าข้าว)">
        <input type="number" id="ipt-amt" placeholder="จำนวนเงิน (บาท)">
        <div class="btn-row">
            <button class="btn bg-green" onclick="saveData('IN')">+ รายรับ</button>
            <button class="btn bg-red" onclick="saveData('OUT')">- รายจ่าย</button>
        </div>
    </div>

    <div class="list-section">
        <div style="font-weight:bold; border-bottom: 2px solid var(--blue); padding-bottom:5px;">ประวัติรายการ</div>
        <div id="history-list"></div>
    </div>

    <button onclick="clearAll()" style="width:100%; margin-top:30px; background:none; border:none; color:var(--grey); cursor:pointer; text-decoration:underline; font-size:12px;">ล้างข้อมูลทั้งหมด</button>
</div>

<script>
    // ใช้ชื่อ Database ใหม่ป้องกันการชนกันของข้อมูลเดิม
    const DB_NAME = 'FINANCE_APP_V5';
    let records = JSON.parse(localStorage.getItem(DB_NAME)) || [];

    // โหลดหน้าเว็บครั้งแรก
    window.onload = function() {
        // ตั้งค่าวันที่ปัจจุบันให้ช่อง Date
        document.getElementById('ipt-date').valueAsDate = new Date();
        refreshUI();
    };

    function saveData(type) {
        const dateInput = document.getElementById('ipt-date').value;
        const nameInput = document.getElementById('ipt-name').value;
        const amtInput = document.getElementById('ipt-amt').value;

        if (!dateInput || !nameInput || !amtInput || amtInput <= 0) {
            alert("กรุณากรอกข้อมูลให้ครบและจำนวนเงินต้องมากกว่า 0 ครับ");
            return;
        }

        const newRecord = {
            id: Date.now(),
            date: dateInput,
            name: nameInput,
            amt: parseFloat(amtInput),
            type: type // 'IN' หรือ 'OUT'
        };

        records.push(newRecord);
        localStorage.setItem(DB_NAME, JSON.stringify(records));

        // ล้างช่องกรอก (ยกเว้นวันที่)
        document.getElementById('ipt-name').value = '';
        document.getElementById('ipt-amt').value = '';
        
        refreshUI();
    }

    function refreshUI() {
        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = '';

        let totalIn = 0;
        let totalOut = 0;

        // เรียงวันที่ล่าสุดขึ้นก่อน
        records.sort((a, b) => new Date(b.date) - new Date(a.date));

        records.forEach(item => {
            if (item.type === 'IN') totalIn += item.amt;
            else totalOut += item.amt;

            const dateFmt = new Date(item.date).toLocaleDateString('th-TH');
            listDiv.innerHTML += `
                <div class="item">
                    <div>
                        <div class="item-date">${dateFmt}</div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="${item.type === 'IN' ? 'txt-green' : 'txt-red'}">
                            ${item.type === 'IN' ? '+' : '-'}${item.amt.toLocaleString()}
                        </span>
                        <span class="del-btn" onclick="removeItem(${item.id})">✕</span>
                    </div>
                </div>
            `;
        });

        // อัปเดตตัวเลข Dashboard
        document.getElementById('top-inc').innerText = totalIn.toLocaleString();
        document.getElementById('top-exp').innerText = totalOut.toLocaleString();
        document.getElementById('top-bal').innerText = (totalIn - totalOut).toLocaleString();

        // อัปเดตกราฟสัดส่วน
        const totalAll = totalIn + totalOut;
        if (totalAll > 0) {
            document.getElementById('prog-inc').style.width = (totalIn / totalAll * 100) + "%";
            document.getElementById('prog-exp').style.width = (totalOut / totalAll * 100) + "%";
        } else {
            document.getElementById('prog-inc').style.width = "50%";
            document.getElementById('prog-exp').style.width = "50%";
        }
    }

    function removeItem(id) {
        if(confirm("ลบรายการนี้ใช่ไหม?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem(DB_NAME, JSON.stringify(records));
            refreshUI();
        }
    }

    function clearAll() {
        if(confirm("ต้องการล้างข้อมูลทั้งหมด?")) {
            records = [];
            localStorage.removeItem(DB_NAME);
            refreshUI();
        }
    }
</script>

</body>
</html>
